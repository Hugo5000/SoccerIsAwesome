name: SHIA
version: ${project.version}
description: ${project.description}
load: STARTUP
api-version: '1.21.10'
author: Hugo B.
authors:
  - IAmSoccer
  - Lynch

main: at.iamsoccer.soccerisawesome.SoccerIsAwesomePlugin
prefix: SHIA

database: false

depend: [ ]
softdepend:
  - LuckPerms
  - Essentials
loadbefore: [ ]

libraries:
  - "at.hugob.plugin.library:config:1.2.9"


permissions:
  # DamageNullifier Permissions
  damagenullifier.reload:
    description: Allows you to reload the damagenullifier module of SIA
    default: op
  # SheepColorChanger Permissions
  sheepcolorchanger.use:
    description: Allows players to change a sheeps wool color by shift right-clicking
    default: op
  # InfiniteSnowball Permissions
  infinitesnowball.*:
    description: Gives access to all infinitesnowball commands
    children:
      infinitesnowball.use: true
      infinitesnowball.give: true
  infinitesnowball.give:
    description: Allows the user to spawn an infinite snowball
    default: op
  infinitesnowball.use:
    description: Allows the user to throw an infinite snowball
    default: op
  snowmancannon.shoot:
    description: Allows the user to launch a fabulous snowman.
    default: op
  # LessAnnoyingItemFrames Permissions
  lessannoyingitemframes.*:
    description: Givess access to all lessannoyingitemframes commands
    children:
      sia.rotationtoggle: true
      sia.containertoggle: true
      sia.clickthroughtoggle: true
  sia.rotationtoggle:
    description: Allows players to use the /sia rotationtoggle which toggles all item frame rotation
    default: op
  sia.containertoggle:
    description: Allows players to use the /sia containertoggle which toggles all item frame rotation when they are on chests and barrels
    default: op
  sia.clickthroughtoggle:
    description: Allows players to use the /sia clickthroughtoggle which toggles the ability to click through item frames on chests and barrels
    default: op
  sia.rotationtoggle.enabled:
    description: A permission to show if a player has /sia rotationtoggle enabled
    default: false
  sia.containertoggle.enabled:
    description: A permission to show if a player has /sia containertoggle enabled
    default: false
  sia.clickthroughtoggle.enabled:
    description: A permission to show if a player has /sia clickthroughtoggle enabled
    default: false
  # Pretty Colored Glass Permissions
  sia.colorglass.use:
    description: Allows you to color glass with dye in your hand
    default: op
  # Essentials AFK Hook Permissions
  sia.essentialsafk.reload:
    description: Allows you to reload the Essentials AFK config
    default: op
  # Block Rotator Permissions
  sia.blockrotator.use:
    description: Allows you to use block rotator
    default: op
  sia.reload:
    description: allows the usage of /shia reload
    default: op
  sia.waypoint:
    description: allows the usage of /waypoint
    default: op
  # Item Rename Permissions
  shia.rename.anvil:
    description: allows to rename the custom name of an item via an anvil
    default: false
  shia.rename.custom-name:
    description: allows to rename the custom name of an item via the command
    default: false
  shia.rename.tooltip:
    description: allows to access to the main /shiarename tooltip section
    default: op
  shia.rename.component:
    description: allows to access to the main /shiarename component section
    default: op
  shia.rename.lore:
    description: allows to rename the lore of an item
    default: op
  shia.rename.item-name:
    description: allows to rename the item name of an item
    default: op
  shia.rename.format.*:
    description: allows the usage of all formatting flags
    default: op
    children:
      shia.rename.format.color: true
      shia.rename.format.font: true
      shia.rename.format.shadow: true
      shia.rename.format.sprites: true
      shia.rename.format.keybind: true
      shia.rename.format.italic: true
      shia.rename.format.bold: true
      shia.rename.format.obfuscated: true
      shia.rename.format.strikethrough: true
      shia.rename.format.underlined: true
  shia.rename.format.color:
    description: allows the usage of the color tag
    default: false
  shia.rename.format.font:
    description: allows the usage of the font tag
    default: false
  shia.rename.format.shadow:
    description: allows the usage of the shadow tag
    default: false
  shia.rename.format.sprites:
    description: allows the usage of the sprites tag
    default: false
  shia.rename.format.keybind:
    description: allows the usage of the keybind tag
    default: false
  shia.rename.format.italic:
    description: allows the usage of the italic tag
    default: false
  shia.rename.format.bold:
    description: allows the usage of the bold tag
    default: false
  shia.rename.format.obfuscated:
    description: allows the usage of the obfuscated tag
    default: false
  shia.rename.format.strikethrough:
    description: allows the usage of the strikethrough tag
    default: false
  shia.rename.format.underlined:
    description: allows the usage of the underlined tag
    default: false